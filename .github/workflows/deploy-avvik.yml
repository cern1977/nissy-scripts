name: Deploy Overvåker Avvik

on:
  push:
    branches: [main]
    paths:
      - 'overvaker-avvik/overvaaker_avvik.js'
      - 'overvaker-avvik/overvaaker_avvik_dev.js'
      - '.github/workflows/deploy-avvik.yml'
  workflow_dispatch:

concurrency:
  group: deploy-avvik
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Finn endrede filer
        id: endret
        run: |
          ENDRET=$(git diff --name-only HEAD^ HEAD 2>/dev/null || echo "")
          DEV=false
          PROD=false
          echo "$ENDRET" | grep -q "overvaker-avvik/overvaaker_avvik_dev.js" && DEV=true
          echo "$ENDRET" | grep -q "overvaker-avvik/overvaaker_avvik.js$" && PROD=true
          # Manuell trigger → push begge for sikkerhets skyld
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEV=true
            PROD=true
          fi
          echo "dev=$DEV" >> $GITHUB_OUTPUT
          echo "prod=$PROD" >> $GITHUB_OUTPUT
          echo "Dev endret: $DEV, Prod endret: $PROD"

      - name: Push dev til server
        if: steps.endret.outputs.dev == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.czvnsicn5.service.one
          username: czvnsicn5_ssh
          password: ${{ secrets.SERVER_SSH_PASSWORD }}
          source: "overvaker-avvik/overvaaker_avvik_dev.js"
          target: "~/webroots/by-route/thomaswestby.no_/skript/"
          strip_components: 1
          overwrite: true

      - name: Push prod til server
        if: steps.endret.outputs.prod == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh.czvnsicn5.service.one
          username: czvnsicn5_ssh
          password: ${{ secrets.SERVER_SSH_PASSWORD }}
          source: "overvaker-avvik/overvaaker_avvik.js"
          target: "~/webroots/by-route/thomaswestby.no_/skript/"
          strip_components: 1
          overwrite: true

      - name: Verifiser dev
        if: steps.endret.outputs.dev == 'true'
        run: |
          sleep 3
          VERSJON=$(curl -s "https://thomaswestby.no/skript/overvaaker_avvik_dev.js?cb=$(date +%s)" | grep -m 1 "const VERSION")
          echo "Server (dev): $VERSJON"
          LOKAL=$(grep -m 1 "const VERSION" overvaker-avvik/overvaaker_avvik_dev.js)
          if [ "$VERSJON" != "$LOKAL" ]; then
            echo "⚠️  Dev-versjon mismatch (server: $VERSJON / repo: $LOKAL) — sjekk Varnish-cache"
            exit 1
          fi
          echo "✅ Avvik dev deployet OK"

      - name: Verifiser prod
        if: steps.endret.outputs.prod == 'true'
        run: |
          sleep 3
          VERSJON=$(curl -s "https://thomaswestby.no/skript/overvaaker_avvik.js?cb=$(date +%s)" | grep -m 1 "const VERSION")
          echo "Server (prod): $VERSJON"
          LOKAL=$(grep -m 1 "const VERSION" overvaker-avvik/overvaaker_avvik.js)
          if [ "$VERSJON" != "$LOKAL" ]; then
            echo "⚠️  Prod-versjon mismatch (server: $VERSJON / repo: $LOKAL) — sjekk Varnish-cache"
            exit 1
          fi
          echo "✅ Avvik prod deployet OK"
